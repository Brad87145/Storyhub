<div class="auth-box">

  <input
    type="email"
    id="email"
    placeholder="Email"
  >

  <input
    type="password"
    id="password"
    placeholder="Password"
  >

  <div class="auth-buttons">

    <button id="signup-btn">
      Sign Up
    </button>

    <button id="login-btn">
      Login
    </button>

    <button id="logout-btn">
      Logout
    </button>

  </div>

</div>
