<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Publish</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="publish">

    <h1>Create A Book</h1>
    <button id="theme-toggle">
  Toggle Theme
</button>

    <div class="book-form">

      <input
        type="text"
        id="title"
        placeholder="Book Title"
      >

      <textarea
        id="description"
        placeholder="Book Description"
      ></textarea>
      
<input
  type="file"
  id="cover"
  accept="image/*"
>
      <button id="publish-btn">
        Publish Book
      </button>

    </div>
<input
  type="text"
  id="search"
  placeholder="Search books..."
>
    <div id="book-list"></div>

  </section>

 <script
  type="module"
  src="firebase.js"
></script>

<script
  src="script.js"
></script>
<script
  type="module"
  src="script.js"
></script>
</body>
</html>
