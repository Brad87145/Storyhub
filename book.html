<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Book</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="book-page">

    <img
      id="book-cover"
      class="book-page-cover"
    >

    <input
  type="text"
  id="book-title"
  placeholder="Book Title"
>

<textarea
  id="book-description"
  placeholder="Book Description"
></textarea>

<input
  type="file"
  id="edit-cover"
>

<button id="save-book-btn">
  Save Book
</button>
    
<div class="chapter-section">

  <h2>Add Chapter</h2>

  <input
    type="text"
    id="chapter-title"
    placeholder="Chapter Title"
  >

  <textarea
    id="chapter-content"
    placeholder="Write your chapter..."
  ></textarea>

  <button id="add-chapter-btn">
    Add Chapter
  </button>

</div>

<div id="chapter-list"></div>
  </section>

  <script src="book.js"></script>

</body>
</html>
