<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>StoryHub Book</title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <section class="book-page">

    <button id="theme-toggle">
      Toggle Theme
    </button>

    <img
      id="book-cover"
      class="book-page-cover"
    />

    <input
      type="text"
      id="book-title"
      placeholder="Book Title"
    >

    <textarea
      id="book-description"
      placeholder="Book Description"
    ></textarea>

    <input
      type="file"
      id="edit-cover"
    >

    <button id="save-book-btn">
      Save Book
    </button>

    <h2>Chapters</h2>

    <input
      type="text"
      id="chapter-title"
      placeholder="Chapter Title"
    />

    <textarea
      id="chapter-content"
      placeholder="Chapter Content"
    ></textarea>

    <button id="add-chapter-btn">
      Add Chapter
    </button>

    <div id="chapter-list"></div>

  </section>

  <script
    type="module"
    src="firebase.js"
  ></script>

  <script
    type="module"
    src="book.js"
  ></script>

  <script src="theme.js"></script>

</body>

</html>
