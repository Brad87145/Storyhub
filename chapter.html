<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>StoryHub Chapter</title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <section class="chapter-page">

    <button id="theme-toggle">
      Toggle Theme
    </button>

    <h1 id="chapter-title"></h1>

    <p id="chapter-content"></p>

    <div class="chapter-navigation">

      <button id="prev-chapter">
        Previous Chapter
      </button>

      <button id="next-chapter">
        Next Chapter
      </button>

    </div>

  </section>

  <script
    type="module"
    src="firebase.js"
  ></script>

  <script
    type="module"
    src="chapter.js"
  ></script>

  <script src="theme.js"></script>

</body>

</html>
